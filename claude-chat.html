<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat Claude (local)</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #1c1c1a;
    color: #ECEAE3;
    margin: 0;
    padding: 24px;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  .key-bar {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  input, textarea, select {
    font-family: inherit;
    font-size: 15px;
    background: #2A2A27;
    color: #ECEAE3;
    border: 1px solid #444441;
    border-radius: 8px;
    padding: 8px 12px;
  }
  input::placeholder, textarea::placeholder { color: #888780; }
  button {
    font-family: inherit;
    font-size: 14px;
    background: transparent;
    color: #ECEAE3;
    border: 1px solid #5F5E5A;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
  }
  button:hover { background: #2A2A27; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #key-status {
    font-size: 13px;
    color: #888780;
    margin: 0;
  }
  #model-select {
    font-size: 13px;
    padding: 6px 10px;
  }
  #messages {
    flex: 1;
    min-height: 420px;
    max-height: 60vh;
    overflow-y: auto;
    border: 1px solid #444441;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #181816;
  }
  .placeholder {
    margin: auto;
    color: #888780;
    font-size: 14px;
    text-align: center;
  }
  .row { display: flex; flex-direction: column; }
  .row.user { align-items: flex-end; }
  .row.assistant { align-items: flex-start; }
  .msg { display: flex; align-items: flex-end; gap: 6px; max-width: 88%; }
  .row.user .msg { flex-direction: row-reverse; }
  .copy-btn {
    flex: none;
    width: 26px;
    height: 26px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 6px;
    color: #888780;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .row:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: #2A2A27; color: #ECEAE3; }
  .copy-btn svg { width: 15px; height: 15px; }
  .copy-btn.copied { color: #5DCAA5; opacity: 1; }
  .bubble {
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.6;
  }
  .row.user .bubble { background: #0C447C; color: #E6F1FB; white-space: pre-wrap; }
  .row.assistant .bubble { background: #2A2A27; color: #ECEAE3; }
  .bubble.error { color: #F09595; white-space: pre-wrap; }
  .bubble.pending { color: #888780; white-space: pre-wrap; }
  .text-part { white-space: pre-wrap; margin: 0 0 10px; }
  .text-part:last-child { margin-bottom: 0; }
  .code-block {
    position: relative;
    margin: 4px 0 10px;
    background: #111110;
    border: 1px solid #534AB7;
    border-radius: 8px;
    overflow: hidden;
  }
  .code-block:last-child { margin-bottom: 0; }
  .code-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    background: #18171F;
    border-bottom: 1px solid #534AB7;
    font-size: 12px;
    color: #AFA9EC;
    font-family: "SF Mono", Consolas, Monaco, monospace;
  }
  .code-block-copy {
    flex: none;
    width: 24px;
    height: 24px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 6px;
    color: #AFA9EC;
  }
  .code-block-copy:hover { background: #26215C; color: #ECEAE3; }
  .code-block-copy svg { width: 14px; height: 14px; }
  .code-block-copy.copied { color: #5DCAA5; }
  .code-block pre {
    margin: 0;
    padding: 12px;
    overflow-x: auto;
    font-family: "SF Mono", Consolas, Monaco, monospace;
    font-size: 13px;
    line-height: 1.55;
    color: #ECEAE3;
    white-space: pre;
  }
  .input-row { display: flex; gap: 8px; }
  #user-input { flex: 1; resize: none; }
  footer { font-size: 12px; color: #5F5E5A; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<div class="app">
  <div>
    <h1>Chat Claude — local</h1>
    <p id="key-status">
      Cheia ta API rămâne doar în acest browser, pe acest calculator. Nu e trimisă nicăieri în afară de api.anthropic.com.
    </p>
  </div>

  <div class="key-bar">
    <input type="password" id="api-key" placeholder="Cheia ta API (sk-ant-...)" autocomplete="off" style="flex:1;" />
    <select id="model-select">
      <option value="claude-sonnet-4-6" selected>Sonnet 4.6</option>
      <option value="claude-opus-4-7">Opus 4.7</option>
      <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
    </select>
    <button id="save-key-btn">Salvează</button>
    <button id="clear-btn" title="Șterge conversația salvată">Șterge</button>
  </div>

  <div id="messages">
    <p class="placeholder">Introdu cheia API mai sus, apoi scrie un mesaj.</p>
  </div>

  <div class="input-row">
    <textarea id="user-input" placeholder="Scrie un mesaj... (Enter trimite, Shift+Enter linie nouă)" rows="2"></textarea>
    <button id="send-btn">Trimite</button>
  </div>

  <footer>Acest fișier rulează 100% local. Cererile pleacă direct din browserul tău către api.anthropic.com.</footer>
</div>

<script>
(function () {
  let apiKey = '';
  let history = [];

  const keyInput = document.getElementById('api-key');
  const saveBtn = document.getElementById('save-key-btn');
  const clearBtn = document.getElementById('clear-btn');
  const keyStatus = document.getElementById('key-status');
  const modelSelect = document.getElementById('model-select');
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  function setStatus(text, ok) {
    keyStatus.textContent = text;
    keyStatus.style.color = ok ? '#5DCAA5' : '#888780';
  }

  saveBtn.addEventListener('click', function () {
    const v = keyInput.value.trim();
    if (!v) {
      setStatus('Introdu o cheie validă mai întâi.', false);
      return;
    }
    if (!v.startsWith('sk-ant-')) {
      setStatus('Atenție: cheile Anthropic începe de obicei cu "sk-ant-". Verifică ce ai lipit.', false);
    }
    apiKey = v;
    keyInput.value = '••••••••••••••••';
    keyInput.disabled = true;
    saveBtn.disabled = true;
    setStatus('Cheie salvată local, doar pentru această sesiune de browser.', true);
  });

  const COPY_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  const CHECK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function makeCopyButton(getText, sizeClass) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = sizeClass;
    btn.title = 'Copiază';
    btn.innerHTML = COPY_ICON;
    btn.addEventListener('click', function () {
      const value = getText();
      const done = function () {
        btn.innerHTML = CHECK_ICON;
        btn.classList.add('copied');
        setTimeout(function () {
          btn.innerHTML = COPY_ICON;
          btn.classList.remove('copied');
        }, 1200);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(value).then(done).catch(function () {});
      } else {
        const ta = document.createElement('textarea');
        ta.value = value;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); done(); } catch (e) {}
        document.body.removeChild(ta);
      }
    });
    return btn;
  }

  // Parsează text simplu cu blocuri ```lang\ncod\n``` și construiește
  // un container cu paragrafe de text + blocuri de cod evidențiate, fiecare
  // bloc de cod cu propriul buton de copiere.
  function renderContent(container, text) {
    container.innerHTML = '';
    const regex = /```([a-zA-Z0-9_+-]*)\n?([\s\S]*?)```/g;
    let lastIndex = 0;
    let match;
    let hasCode = false;

    function appendText(chunk) {
      if (!chunk) return;
      const p = document.createElement('div');
      p.className = 'text-part';
      p.textContent = chunk;
      container.appendChild(p);
    }

    while ((match = regex.exec(text)) !== null) {
      hasCode = true;
      appendText(text.slice(lastIndex, match.index));

      const lang = match[1] || 'cod';
      const code = match[2].replace(/\n$/, '');

      const block = document.createElement('div');
      block.className = 'code-block';

      const header = document.createElement('div');
      header.className = 'code-block-header';
      const label = document.createElement('span');
      label.textContent = lang;
      header.appendChild(label);
      const copyBtn = makeCopyButton(function () { return code; }, 'code-block-copy');
      header.appendChild(copyBtn);
      block.appendChild(header);

      const pre = document.createElement('pre');
      pre.textContent = code;
      block.appendChild(pre);

      container.appendChild(block);
      lastIndex = regex.lastIndex;
    }

    appendText(text.slice(lastIndex));

    if (!hasCode) {
      container.textContent = text;
    }

    return hasCode;
  }

  function addMessage(role, text) {
    const ph = messagesEl.querySelector('.placeholder');
    if (ph) ph.remove();
    const row = document.createElement('div');
    row.className = 'row ' + role;
    const msg = document.createElement('div');
    msg.className = 'msg';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const copyBtn = makeCopyButton(function () { return bubble.dataset.raw || bubble.textContent; }, 'copy-btn');
    msg.appendChild(bubble);
    msg.appendChild(copyBtn);
    row.appendChild(msg);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  const STORAGE_KEY = 'claude-chat-history-v1';

  function saveHistory() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    } catch (e) {}
  }

  function loadHistory() {
    let saved = [];
    try {
      saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch (e) {
      saved = [];
    }
    if (!Array.isArray(saved) || saved.length === 0) return;

    history = saved;
    const ph = messagesEl.querySelector('.placeholder');
    if (ph) ph.remove();

    saved.forEach(function (entry) {
      if (entry.role === 'user') {
        addMessage('user', entry.content);
      } else {
        const bubble = addMessage('assistant', entry.content);
        bubble.dataset.raw = entry.content;
        renderContent(bubble, entry.content);
      }
    });
  }

  clearBtn.addEventListener('click', function () {
    history = [];
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    messagesEl.innerHTML = '<p class="placeholder">Introdu cheia API mai sus, apoi scrie un mesaj.</p>';
  });

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    if (!apiKey) {
      setStatus('Salvează mai întâi cheia API.', false);
      return;
    }

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    saveHistory();
    inputEl.value = '';
    sendBtn.disabled = true;

    const pending = addMessage('assistant', 'Se generează răspunsul...');
    pending.classList.add('pending');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: modelSelect.value,
          max_tokens: 1024,
          messages: history
        })
      });
      const data = await res.json();

      if (data.error) {
        pending.classList.remove('pending');
        pending.classList.add('error');
        pending.textContent = 'Eroare API: ' + (data.error.message || JSON.stringify(data.error));
      } else {
        const block = (data.content || []).find(function (b) { return b.type === 'text'; });
        const reply = block ? block.text : '(fără răspuns text)';
        pending.classList.remove('pending');
        pending.dataset.raw = reply;
        renderContent(pending, reply);
        history.push({ role: 'assistant', content: reply });
        saveHistory();
      }
    } catch (err) {
      pending.classList.remove('pending');
      pending.classList.add('error');
      pending.textContent = 'Eroare de rețea: ' + err.message;
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  loadHistory();
})();
</script>
</body>
</html>
