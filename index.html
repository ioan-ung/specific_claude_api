<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat Claude (local)</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="locked">
<!-- Poartă de parolă: prima fereastră, acoperă tot până la deblocare. -->
<div id="gate">
  <div class="gate-box">
    <h2>Acces protejat</h2>
    <input type="password" id="gate-password" placeholder="Parolă" autocomplete="off" />
    <button id="gate-btn">Intră</button>
    <p id="gate-msg"></p>
  </div>
</div>

<div class="app">
  <div>
    <h1>Chat Claude</h1>
  </div>

  <div class="key-bar">
    <select id="model-select">
      <option value="claude-sonnet-4-6" selected>Sonnet 4.6</option>
      <option value="claude-opus-4-7">Opus 4.7</option>
      <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
    </select>
    <button id="clear-btn" title="Șterge conversația salvată">Șterge</button>
  </div>

  <div id="messages">
    <p class="placeholder">Scrie un mesaj pentru a începe conversația.</p>
  </div>

  <div class="input-row">
    <textarea id="user-input" placeholder="Scrie un mesaj... (Enter trimite, Shift+Enter linie nouă)" rows="2"></textarea>
    <button id="send-btn">Trimite</button>
  </div>

  <footer>Cererile sunt procesate prin serverul Vercel. Cheia API este configurată pe server.</footer>
</div>

<!-- Logica e împărțită pe fișiere, încărcate în ordinea dependențelor.
     Toate folosesc namespace-ul global ChatApp. app.js trebuie să fie ultimul. -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>

<script src="js/gate.js"></script>
<script src="js/dom.js"></script>
<script src="js/render.js"></script>
<script src="js/storage.js"></script>
<script src="chat-app.js"></script>
<script src="js/app.js"></script>
</body>
</html>
